name: 'Build — Docker Image'
description: >
  Builds and pushes a multi-tag Docker image to GHCR.
  Tags: <version-without-v> and latest.
  Uses GitHub Actions cache (gha) to speed up layer builds.

inputs:
  version:
    description: 'Version tag (e.g. v1.2.0) — the "v" prefix is stripped for the Docker tag'
    required: true
  registry:
    description: 'Container registry hostname (e.g. ghcr.io)'
    required: true
  image_name:
    description: 'Image name including owner (e.g. org/repo)'
    required: true
  ghcr_pat:
    description: 'GitHub Container Registry personal access token'
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.ghcr_pat }}

    - name: Prepare Version
      id: version
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        VERSION_NO_V="${VERSION#v}"
        echo "version_no_v=$VERSION_NO_V" >> $GITHUB_OUTPUT
        echo "::notice::Docker tag: $VERSION_NO_V"

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.registry }}/${{ inputs.image_name }}
        tags: |
          type=raw,value=${{ steps.version.outputs.version_no_v }}
          type=raw,value=latest

    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
