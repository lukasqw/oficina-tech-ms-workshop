name: 'Deploy — Application to Kubernetes'
description: >
  Applies Kubernetes manifests, updates the deployment image, waits for rollout
  completion, verifies cluster state and runs health checks against the live pod.
  Fails with detailed diagnostics on any error — the release tag is NOT created
  if this action fails.

inputs:
  app_name:
    description: 'Application name — used to derive Kubernetes resource names (e.g. oficina-tech)'
    required: true
  namespace:
    description: 'Kubernetes namespace'
    required: true
  version:
    description: 'Version being deployed (e.g. v1.2.0) — used to resolve the image tag'
    required: true
  registry:
    description: 'Container registry hostname (e.g. ghcr.io)'
    required: true
  image_name:
    description: 'Image name including owner (e.g. org/repo)'
    required: true
  nlb_dns:
    description: 'Network Load Balancer DNS — used for endpoint display in logs'
    required: true
  server_port:
    description: 'Port the application listens on — used for the in-pod health check'
    required: false
    default: '8080'
  health_endpoint:
    description: 'Health check HTTP path'
    required: false
    default: '/health'

runs:
  using: composite
  steps:
    # Applies manifests in dependency order, updates the image and waits for
    # rollout. On failure, collects pod logs and events with common error hints.
    - name: Deploy Application
      shell: bash
      env:
        APP_NAME: ${{ inputs.app_name }}
        NAMESPACE: ${{ inputs.namespace }}
        VERSION: ${{ inputs.version }}
        REGISTRY: ${{ inputs.registry }}
        IMAGE_NAME: ${{ inputs.image_name }}
        SERVER_PORT: ${{ inputs.server_port }}
      run: |
        IMAGE_TAG="${VERSION#v}"
        IMAGE="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
        DEPLOYMENT="${APP_NAME}-deployment"
        echo "::notice::Deploying image: $IMAGE"

        envsubst < k8s/service.yaml    | kubectl apply -f -
        envsubst < k8s/deployment.yaml | kubectl apply -f -
        envsubst < k8s/hpa.yaml        | kubectl apply -f -

        kubectl set image "deployment/$DEPLOYMENT" \
          "$APP_NAME=$IMAGE" -n "$NAMESPACE"

        # Force restart to ensure new ConfigMap values are picked up
        kubectl rollout restart "deployment/$DEPLOYMENT" -n "$NAMESPACE"

        echo "::notice::Waiting for rollout (timeout: 5m)..."

        if ! timeout 300 kubectl rollout status "deployment/$DEPLOYMENT" -n "$NAMESPACE"; then
          echo "::error::Rollout failed or timed out"
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n "$NAMESPACE" -o wide
          echo ""
          echo "=== Deployment ==="
          kubectl describe deployment "$DEPLOYMENT" -n "$NAMESPACE"

          POD=$(kubectl get pods -n "$NAMESPACE" -l "app=$APP_NAME" \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")

          if [ -n "$POD" ]; then
            echo ""
            echo "=== Pod Logs: $POD ==="
            kubectl logs "$POD" -n "$NAMESPACE" --tail=100 || true
            echo ""
            echo "=== Pod Description ==="
            kubectl describe pod "$POD" -n "$NAMESPACE"

            LOGS=$(kubectl logs "$POD" -n "$NAMESPACE" --tail=100 2>&1 || echo "")
            if echo "$LOGS" | grep -qi "no pg_hba.conf entry"; then
              echo "::error::RDS Security Group is blocking pod connections"
            elif echo "$LOGS" | grep -qi "connection refused\|connection reset"; then
              echo "::error::Cannot connect to RDS — check DB_HOST in ConfigMap, DB_PASSWORD secret and RDS availability"
            elif echo "$LOGS" | grep -qi "password authentication failed"; then
              echo "::error::Wrong database password — check DB_PASSWORD secret"
            elif echo "$LOGS" | grep -qi "database.*does not exist"; then
              echo "::error::Database does not exist — check rds_dbname in ConfigMap"
            fi
          fi

          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n "$NAMESPACE" --sort-by='.lastTimestamp' | tail -30
          exit 1
        fi

        echo "::notice::Rollout completed successfully"

    - name: Verify Deployment
      shell: bash
      env:
        APP_NAME: ${{ inputs.app_name }}
        NAMESPACE: ${{ inputs.namespace }}
        NLB_DNS: ${{ inputs.nlb_dns }}
        HEALTH_ENDPOINT: ${{ inputs.health_endpoint }}
      run: |
        echo "=== Pods ==="
        kubectl get pods -n "$NAMESPACE"

        echo ""
        echo "=== Service ==="
        kubectl get svc "$APP_NAME-service" -n "$NAMESPACE" -o wide

        echo ""
        echo "=== HPA ==="
        kubectl get hpa -n "$NAMESPACE"

        echo ""
        echo "=== ConfigMap ==="
        kubectl describe configmap "$APP_NAME-config" -n "$NAMESPACE"

        echo ""
        echo "Endpoints:"
        echo "  Health:  http://$NLB_DNS$HEALTH_ENDPOINT"
        echo "  Swagger: http://$NLB_DNS/swagger/index.html"
        echo "  API:     http://$NLB_DNS/"

    # Waits for pods to be Ready, then runs an in-pod wget against the health endpoint.
    # Any failure here prevents the release tag from being created.
    - name: Health Check
      shell: bash
      env:
        APP_NAME: ${{ inputs.app_name }}
        NAMESPACE: ${{ inputs.namespace }}
        SERVER_PORT: ${{ inputs.server_port }}
        HEALTH_ENDPOINT: ${{ inputs.health_endpoint }}
      run: |
        echo "::notice::Waiting for pods to be Ready (timeout: 5m)..."
        if ! kubectl wait --for=condition=ready pod \
          -l "app=$APP_NAME" \
          -n "$NAMESPACE" \
          --timeout=300s; then
          echo "::error::Pods not ready within timeout"
          kubectl get pods -n "$NAMESPACE" -o wide
          exit 1
        fi

        # Exclude terminating pods (deletionTimestamp set) — rolling update leaves old pods
        # in Ready+Terminating state which causes Connection refused on health check
        POD=$(kubectl get pods -n "$NAMESPACE" -l "app=$APP_NAME" -o json 2>/dev/null \
          | jq -r '[.items[] | select(.metadata.deletionTimestamp == null)] | first | .metadata.name // empty')
        if [ -z "$POD" ]; then
          echo "::error::No running (non-terminating) pods found after rollout"
          kubectl get pods -n "$NAMESPACE" -o wide
          exit 1
        fi

        echo "::notice::Running health check on pod: $POD"
        if ! kubectl exec -n "$NAMESPACE" "$POD" -- \
            wget -qO- --timeout=10 "http://localhost:${SERVER_PORT}${HEALTH_ENDPOINT}"; then
          echo "::error::Health check failed — release tag will not be created"
          echo ""
          echo "=== Pod Logs ==="
          kubectl logs -n "$NAMESPACE" "$POD" --tail=30
          exit 1
        fi

        echo ""
        echo "=== Recent Pod Logs ==="
        kubectl logs -n "$NAMESPACE" "$POD" --tail=20
