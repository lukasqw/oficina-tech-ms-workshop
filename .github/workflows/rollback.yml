name: Rollback Application

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rollback to (e.g. v1.2.3) â€” must be an existing tag with a Docker image in GHCR'
        required: true
        type: string

permissions:
  contents: read
  packages: read
  id-token: write

# Same concurrency group as deploy â€” prevents a rollback from running alongside a deploy.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'app-oficina-tech' }}
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  rollback:
    name: Rollback to ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Validate Version Format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: '$VERSION'. Expected format: v1.2.3"
            exit 1
          fi

      # Checkout na tag especÃ­fica para que os manifests K8s e composite actions
      # correspondam exatamente ao que foi deployado naquela versÃ£o.
      # infra-connect NÃƒO Ã© fixado na tag â€” lÃª o TF state atual do S3 para obter
      # o cluster, RDS e NLB live.
      - name: Checkout at ${{ github.event.inputs.version }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}
          fetch-depth: 0

      - name: Validate Tag Exists
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag '$VERSION' does not exist in this repository"
            exit 1
          fi
          echo "::notice::Rolling back to $VERSION ($(git rev-parse --short $VERSION))"

      - name: Validate Docker Image Exists
        run: |
          VERSION="${{ github.event.inputs.version }}"
          IMAGE_TAG="${VERSION#v}"
          IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          echo "::notice::Checking image: $IMAGE"
          if ! docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "::error::Docker image '$IMAGE' not found in GHCR."
            echo "::error::Make sure the original deploy for $VERSION completed successfully."
            exit 1
          fi
          echo "::notice::Image confirmed: $IMAGE"
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

      - name: Validate Required Secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]     && MISSING+=("AWS_ACCESS_KEY_ID")
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING+=("AWS_SECRET_ACCESS_KEY")
          [ -z "${{ secrets.DB_PASSWORD }}" ]            && MISSING+=("DB_PASSWORD")
          [ -z "${{ secrets.JWT_SECRET_KEY }}" ]         && MISSING+=("JWT_SECRET_KEY")
          [ -z "${{ secrets.GHCR_PAT }}" ]              && MISSING+=("GHCR_PAT")
          [ -z "${{ secrets.DD_API_KEY }}" ]             && MISSING+=("DD_API_KEY")
          [ -z "${{ secrets.DD_APP_KEY }}" ]             && MISSING+=("DD_APP_KEY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Required secrets missing: ${MISSING[*]}"
            exit 1
          fi

      # Reads current TF state from S3 â€” always reflects the live infrastructure,
      # regardless of which application version we are rolling back to.
      - name: Connect to Infrastructure
        id: infra
        uses: ./.github/actions/deploy/infra-connect
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region: ${{ env.AWS_REGION }}
          infra_tfstate_s3_path: ${{ vars.INFRA_TFSTATE_S3_PATH }}
          db_tfstate_s3_path: ${{ vars.DB_TFSTATE_S3_PATH }}
          db_ms_key: ms3

      - name: Provision Kubernetes Resources
        uses: ./.github/actions/deploy/k8s-provision
        with:
          app_name: ${{ vars.APP_NAME }}
          namespace: ${{ env.K8S_NAMESPACE }}
          version: ${{ github.event.inputs.version }}
          server_port: ${{ vars.SERVER_PORT || '8083' }}
          rds_address: ${{ steps.infra.outputs.rds_address }}
          rds_port: ${{ steps.infra.outputs.rds_port }}
          rds_dbname: ${{ steps.infra.outputs.rds_dbname }}
          rds_user: ${{ steps.infra.outputs.rds_user }}
          aws_region: ${{ env.AWS_REGION }}
          sqs_inventory_op_requested_url: ${{ steps.infra.outputs.sqs_inventory_op_requested_url }}
          sqs_inventory_op_succeeded_url: ${{ steps.infra.outputs.sqs_inventory_op_succeeded_url }}
          sqs_inventory_op_failed_url: ${{ steps.infra.outputs.sqs_inventory_op_failed_url }}
          sns_inventory_low_alert_arn: ${{ secrets.SNS_INVENTORY_LOW_ALERT_ARN }}
          db_password: ${{ secrets.DB_PASSWORD }}
          jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
          ghcr_pat: ${{ secrets.GHCR_PAT }}
          github_actor: ${{ github.actor }}
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_site: ${{ vars.DD_SITE }}

      # Applies K8s manifests from the tag and sets the image to the target version.
      # The image ghcr.io/{repo}:{version} must already exist â€” no build happens here.
      - name: Deploy Application at ${{ github.event.inputs.version }}
        uses: ./.github/actions/deploy/k8s-application
        with:
          app_name: ${{ vars.APP_NAME }}
          namespace: ${{ env.K8S_NAMESPACE }}
          version: ${{ github.event.inputs.version }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}
          nlb_dns: ${{ steps.infra.outputs.nlb_dns }}
          server_port: ${{ vars.SERVER_PORT || '8083' }}
          health_endpoint: ${{ vars.HEALTH_ENDPOINT || '/health' }}

      - name: Rollback Summary
        if: always()
        run: |
          VERSION="${{ github.event.inputs.version }}"
          IMAGE_TAG="${VERSION#v}"
          {
            echo "## Rollback Summary"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| Rolled back to | \`$VERSION\` |"
            echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}\` |"
            echo "| Cluster | \`${{ steps.infra.outputs.cluster_name }}\` |"
            echo "| Namespace | \`${{ env.K8S_NAMESPACE }}\` |"
            echo "| NLB DNS | \`${{ steps.infra.outputs.nlb_dns }}\` |"
            echo "| Region | \`${{ env.AWS_REGION }}\` |"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Actor | @${{ github.actor }} |"
            echo "| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "> **Note:** No new tag was created. The rollback redeployed the Docker image from \`$VERSION\` to the current cluster."
          } >> $GITHUB_STEP_SUMMARY
