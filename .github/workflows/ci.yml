name: CI

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop ]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, Vet & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ vars.GO_VERSION || '1.25' }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Go Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run Tests
        run: go test ./... -v -coverprofile=coverage.out -covermode=atomic

      - name: Coverage Gate
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/total:/ { sub(/%/, "", $3); print $3 }')
          echo "Coverage: ${COVERAGE}%"
          awk -v coverage="$COVERAGE" 'BEGIN { exit !(coverage >= 80.0) }' || \
            (echo "::error::Coverage ${COVERAGE}% is below the 80% threshold" && exit 1)
